name: iOS Build & Upload

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-ios:
    name: Build iOS (.ipa) artifact for Sideloadly
    runs-on: macos-latest
    env:
      NODE_OPTIONS: --max_old_space_size=4096

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            if [ -f package-lock.json ]; then npm ci; else npm install; fi
          fi
          if [ -f capacitor-app/package.json ]; then
            if [ -f capacitor-app/package-lock.json ]; then (cd capacitor-app && npm ci); else (cd capacitor-app && npm install); fi
          fi

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods -v 1.12.1 || true

      - name: Ensure Capacitor iOS platform
        run: |
          cd capacitor-app
          # If iOS platform hasn't been added, add it
          if [ -d ios ] || [ -d ios/App ]; then
            echo "iOS platform already added"
          else
            npx --yes @capacitor/cli add ios
          fi
          npx --yes @capacitor/cli sync ios

      - name: Install fastlane
        run: |
          sudo gem install fastlane -NV

      - name: Run Fastlane build (artifact)
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
        run: |
          cd ios/App
          fastlane ios build_artifact

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios/artifacts/**/*.ipa

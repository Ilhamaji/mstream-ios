name: iOS Build (unsigned .ipa) for Sideloadly

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-unsigned:
    name: Build unsigned .ipa artifact
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            if [ -f package-lock.json ]; then npm ci; else npm install; fi
          fi
          if [ -f capacitor-app/package.json ]; then
            if [ -f capacitor-app/package-lock.json ]; then (cd capacitor-app && npm ci); else (cd capacitor-app && npm install); fi
          fi

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods -v 1.12.1 || true

      - name: Ensure Capacitor iOS platform
        run: |
          cd capacitor-app
          # If iOS platform hasn't been added, add it
          if [ -d ios ] || [ -d ios/App ]; then
            echo "iOS platform already added"
          else
            echo "Installing @capacitor/ios package and adding iOS platform"
            npm install @capacitor/ios@latest --no-audit --no-fund
            npx --yes @capacitor/cli add ios --packagemanager SPM
          fi
          find . -name Podfile | while read -r podfile; do
            echo "Patching $podfile"
            perl -pi -e 's/^platform :ios, .*/platform :ios, "26.0"/' "$podfile"
            if ! grep -q '^platform :ios' "$podfile"; then
              sed -i '' '1iplatform :ios, "26.0"' "$podfile"
            fi
          done
          find . -name project.pbxproj | while read -r pbxfile; do
            echo "Patching pbxproj $pbxfile"
            perl -pi -e 's/IPHONEOS_DEPLOYMENT_TARGET = \d+\.\d+/IPHONEOS_DEPLOYMENT_TARGET = 26.0/g' "$pbxfile"
          done
          find . -name "*.xcconfig" | while read -r xcfile; do
            echo "Patching xcconfig $xcfile"
            perl -pi -e 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 26.0/' "$xcfile"
          done
          npx --yes @capacitor/cli copy ios
          cd ios/App
          if [ -f Podfile ]; then
            pod install --repo-update
          fi

      - name: Build unsigned .app archive
        working-directory: ios/App
        run: |
          set -e
          ARCHIVE_PATH="$(pwd)/build/App.xcarchive"
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos -archivePath "$ARCHIVE_PATH" archive CODE_SIGNING_ALLOWED=NO

      - name: Pack unsigned .ipa
        working-directory: ios/App
        run: |
          set -e
          ARCHIVE_DIR="$(pwd)/build/App.xcarchive"
          APP_PATH="$ARCHIVE_DIR/Products/Applications/App.app"
          mkdir -p payload
          rm -rf payload/Payload || true
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r ../unsigned-App.ipa Payload
          ls -la ../unsigned-App.ipa

      - name: Upload unsigned .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: ios/App/unsigned-App.ipa

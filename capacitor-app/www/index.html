<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cineby (Capacitor runtime placeholder)</title>
  </head>
  <body>
    <p>
      This is a placeholder webdir for Capacitor. The app opens
      https://cineby.at when running.
    </p>
    <script>
      // Force window.open and target="_blank" navigations to stay inside the app
      window.open = (url) => {
        window.location.href = url;
      };

      document.addEventListener("click", (event) => {
        const anchor = event.target.closest("a");
        if (!anchor) return;
        if (anchor.target === "_blank") {
          event.preventDefault();
          window.location.href = anchor.href;
        }
      });
    </script>
  </body>
</html>
